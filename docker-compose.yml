version: '3.8'

services:
  fuyu-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fuyu-backend
    ports:
      - "8000:8000"
    volumes:
      # 將本機的資料庫與上傳資料夾完整掛載到根目錄以對應原系統的 Path 邏輯
      - ./factory:/factory
      - ./fuyu.sqlite:/fuyu.sqlite
      # (可選) 若想在開發時保留原始測試的 PDFs 目錄，也可掛載上來
      - ./PDFs:/PDFs
    # 如果您的主機配備 Nvidia GPU 並已安裝 NVIDIA Container Toolkit，這段能將 GPU 資源直通給容器
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  fuyu-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fuyu-frontend
    ports:
      # 將對外 Port 對應為原本您習慣的 5173，容器內部則是 nginx 的 80 port
      - "5173:80"
    depends_on:
      - fuyu-backend
    restart: unless-stopped
